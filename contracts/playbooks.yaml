playbooks:
  initial_access_v1:
    description: "Standard triage for general entry point investigation (default)."
    steps:
      - run: chainsaw_evtx
      - run: hayabusa_evtx
      - run: plaso_evtx

  log_tampering_v1:
    description: "Focused triage for evidence of log clearing or audit subversion."
    steps:
      - run: hayabusa_evtx
        args: ["--profile", "log-tampering"] # Conceptual, passed if pipeline supports
      - run: plaso_evtx
      - run: chainsaw_evtx

  lateral_movement_v1:
    description: "Focused triage for RDP, SMB, WMI, and remote auth/processes."
    steps:
      - run: chainsaw_evtx
      - run: hayabusa_evtx
      - run: plaso_evtx

  persistence_v1:
    description: "Focused triage for services, run keys, and scheduled tasks."
    steps:
      - run: chainsaw_evtx
      - run: hayabusa_evtx
      - run: plaso_evtx

